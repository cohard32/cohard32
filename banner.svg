    <rect x="4" y="9"  width="140" height="112" rx="22" fill="#3F7A10"/>
    <rect x="2" y="4"  width="140" height="112" rx="22" fill="#63B81A"/>
    <rect x="0" y="0"  width="140" height="112" rx="22" fill="#0D2818" stroke="#B4FF3C" stroke-opacity="0.5" stroke-width="2"/>
    <circle cx="24" cy="24" r="5" fill="#FF5A5A"/>
    <circle cx="42" cy="24" r="5" fill="#D4FF5C"/>
