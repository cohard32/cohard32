<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="cohard32">
  <!-- ROY MESSANGER teması ile aynı palet (lib/tema.dart) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050F0A"/>
      <stop offset="55%" stop-color="#071A10"/>
      <stop offset="100%" stop-color="#0D2818"/>
    </linearGradient>
    <linearGradient id="neonY" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4FF5C"/>
      <stop offset="60%" stop-color="#B4FF3C"/>
      <stop offset="100%" stop-color="#A8E02A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B4FF3C" stop-opacity="0.28"/>
      <stop offset="70%" stop-color="#B4FF3C" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#B4FF3C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kenar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B4FF3C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#B4FF3C" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#B4FF3C" stop-opacity="0"/>
    </linearGradient>
    <pattern id="izgara" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#B4FF3C" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#izgara)"/>
  <ellipse cx="1010" cy="60" rx="420" ry="270" fill="url(#glow)"/>
  <ellipse cx="130" cy="300" rx="330" ry="210" fill="url(#glow)" opacity="0.5"/>

  <!-- 3B terminal kutusu -->
  <g transform="translate(84 84)">
